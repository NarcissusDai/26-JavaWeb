<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" href="/assets/bootstrap-5.3.8/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术博客 - Narcissus</title>
    <link rel="stylesheet" href="./assets/bootstrap-5.3.8/dist/css/bootstrap.min.css">
    <script src="./assets/bootstrap-5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background-color: #f4f7f9; /* 极淡的灰色背景，衬托主体卡片 */
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* 大气大背景感的核心：显著增加高度 + 渐变遮罩 */
        .hero-banner {
            background-image: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 100%), url('11.jpg');
            background-size: cover;
            background-position: center;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* 精致化搜索组件（保持原有风格） */
        .search-group .form-select, 
        .search-group .form-control {
            border: 1px solid #eee;
            background-color: #f9f9f9;
            font-size: 14px;
        }

        .search-group .form-select:focus, 
        .search-group .form-control:focus {
            background-color: #fff;
            box-shadow: none;
            border-color: #dee2e6;
        }
    </style>
</head>
<body>
    
    <div class="container my-5 p-0 shadow-lg rounded-4 bg-white overflow-hidden" style="max-width: 1200px;">
        
        <div class="row m-0 hero-banner d-flex align-items-center" style="height: 280px;">
            <div class="col-12 text-center">
                <h1 class="m-0 fw-bold" style="font-size: 42px; letter-spacing: 2px;">
                    NARCISSUS <span class="fw-light">BLOG</span>
                </h1>
                <p class="m-0 mt-3 fw-light opacity-75" style="font-size: 16px; letter-spacing: 1px;">
                    专注 JavaWeb 探索与个人技术沉淀
                </p>
            </div>
        </div>

        <div class="row m-0 border-bottom">
            <nav class="navbar navbar-expand-lg navbar-light bg-white px-4 py-3">
                <div class="container-fluid p-0">
                    
                    <ul class="navbar-nav d-flex gap-4">
                        <li class="nav-item">
                            <a class="nav-link fw-bold text-dark p-0" href="#">首页</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-muted p-0" href="#">我的博客</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-muted p-0" href="#">申请博客</a>
                        </li>
                    </ul>

                    <div class="collapse navbar-collapse justify-content-end" id="navbarSearch">
                        <form class="d-flex search-group gap-2 align-items-center">
                            <select class="form-select border-0 text-muted" style="width: 110px; cursor: pointer;">
                                <option selected>文章名</option>
                                <option value="author">作者</option>
                                <option value="tag">分类</option>
                            </select>
                            
                            <div style="width: 1px; height: 20px; background: #eee;"></div>

                            <input class="form-control border-0 bg-transparent" type="search" placeholder="输入关键词..." style="width: 200px;">
                            
                            <button class="btn btn-dark btn-sm px-3 rounded-pill" type="submit" style="font-size: 13px;">
                                搜索
                            </button>
                        </form>

                        <div class="ms-4 border-start ps-4 d-flex gap-3">
                            <a href="#" class="text-decoration-none text-muted small mt-1">登录</a>
                            <a href="#" class="btn btn-outline-dark btn-sm rounded-pill px-3">注册</a>
                        </div>
                    </div>
                </div>
            </nav>
        </div>
        <div class="p-5" style="min-height: 500px; background: linear-gradient(to bottom, #fff, #fafafa);">
            <div class="row">
                <div class="col-md-8">
                    <div class="p-4 border rounded-3 mb-4 bg-white shadow-sm">
                        <span class="badge bg-light text-dark mb-2">最新文章</span>
                        <h5>欢迎来到我的大背景技术博客</h5>
                        <p class="text-muted small">简约不代表简单，它是深思熟虑后的克制。</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="p-4 bg-light rounded-3" style="min-height: 200px;">
                        <h6 class="fw-bold">侧边栏</h6>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
